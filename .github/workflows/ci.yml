name: CI

# Quality gate: typecheck (strict), lint, and the full test suite — including the
# machine-proven `par` solutions — run on every push and PR. The Docker workflow
# builds images; this is what actually guards correctness before a merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

      # The optional accounts backend is zero-dependency (Node's built-in test
      # runner + --experimental-sqlite), so it needs no install of its own.
      - name: Server tests
        working-directory: server
        run: npm test
