<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vim-logo.svg" />
    <link rel="apple-touch-icon" href="./vim-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d14" />
    <meta name="color-scheme" content="dark" />

    <title>VimLegends — Learn Vim by Playing | Free Gamified Vim Trainer</title>
    <meta
      name="description"
      content="Learn Vim by playing. VimLegends is a free, gamified Vim trainer: real editor challenges with genuine Vim keybindings, XP, boss fights, a touch-friendly quiz mode, and arcade drills. Skills transfer 1:1 to real Vim/Neovim — and it works 100% offline."
    />
    <meta
      name="keywords"
      content="vim, learn vim, vim trainer, vim tutorial, vim game, vimtutor, neovim, vim keybindings, vim practice, vim golf, vim cheatsheet, code editor game, developer tools, keyboard shortcuts"
    />
    <meta name="author" content="Zeecka" />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="VimLegends" />
    <!-- Canonical / social URLs default to the GitHub Pages address; change these
         two (and public/sitemap.xml) if you deploy under your own domain. -->
    <link rel="canonical" href="https://zeecka.github.io/VimLegends/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VimLegends" />
    <meta property="og:title" content="VimLegends — Learn Vim by Playing" />
    <meta
      property="og:description"
      content="A free, gamified Vim trainer with real editor challenges, boss fights, a mobile quiz, and arcade drills. Skills transfer 1:1 to real Vim/Neovim."
    />
    <meta property="og:url" content="https://zeecka.github.io/VimLegends/" />
    <meta property="og:image" content="https://raw.githubusercontent.com/Zeecka/VimLegends/main/docs/media/home.png" />
    <meta property="og:image:alt" content="VimLegends — a real Vim editor and your Hero over a cel-shaded 3D world" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VimLegends — Learn Vim by Playing" />
    <meta
      name="twitter:description"
      content="A free, gamified Vim trainer with real editor challenges, boss fights, a mobile quiz, and arcade drills."
    />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/Zeecka/VimLegends/main/docs/media/home.png" />

    <!-- iOS add-to-home-screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VimLegends" />

    <!-- Structured data — helps search engines show this as a free web game. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "VimLegends",
        "alternateName": "Learn Vim by Playing",
        "url": "https://zeecka.github.io/VimLegends/",
        "description": "A free, gamified Vim trainer with real editor challenges, boss fights, a touch-friendly quiz mode, and arcade drills. Skills transfer 1:1 to real Vim and Neovim.",
        "image": "https://raw.githubusercontent.com/Zeecka/VimLegends/main/docs/media/home.png",
        "applicationCategory": "GameApplication",
        "genre": ["Educational", "Typing"],
        "operatingSystem": "Web browser",
        "inLanguage": "en",
        "author": { "@type": "Person", "name": "Zeecka" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <!-- Fonts are self-hosted (bundled via @fontsource) so the app works offline. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
