server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Long-cache hashed build assets (filenames change every build)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache the HTML entry point — it must always point at the latest assets
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Backend API (optional accounts + score sharing) — see server/README.md
  location /api/ {
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # SPA: fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
